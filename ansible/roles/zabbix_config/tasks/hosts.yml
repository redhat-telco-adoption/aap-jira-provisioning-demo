---
# Registration of the Zabbix server itself. A default install ships with a
# "Zabbix server" host that is disabled and has no agent interface — enable it
# and point its agent interface at localhost so self-monitoring works.

- name: Get Zabbix server host
  ansible.builtin.uri:
    url: "{{ zabbix_url }}/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.get"
      params:
        filter:
          host:
            - "{{ zabbix_server_host_name }}"
        selectInterfaces: extend
      auth: "{{ zbx_token }}"
      id: 1
  register: zbx_server_host_get

- name: Get Zabbix servers host group ID
  ansible.builtin.uri:
    url: "{{ zabbix_url }}/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "hostgroup.get"
      params:
        filter:
          name:
            - "{{ zabbix_server_host_group }}"
      auth: "{{ zbx_token }}"
      id: 1
  register: zbx_server_group_get
  when: zbx_server_host_get.json.result | length == 0

- name: Create Zabbix server host
  ansible.builtin.uri:
    url: "{{ zabbix_url }}/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.create"
      params:
        host: "{{ zabbix_server_host_name }}"
        status: 0
        groups:
          - groupid: "{{ zbx_server_group_get.json.result[0].groupid }}"
        interfaces:
          - type: 1
            main: 1
            useip: 1
            ip: "127.0.0.1"
            dns: ""
            port: "10050"
      auth: "{{ zbx_token }}"
      id: 1
  when: zbx_server_host_get.json.result | length == 0

- name: Enable Zabbix server host if disabled
  ansible.builtin.uri:
    url: "{{ zabbix_url }}/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.update"
      params:
        hostid: "{{ zbx_server_host_get.json.result[0].hostid }}"
        status: 0
      auth: "{{ zbx_token }}"
      id: 1
  when:
    - zbx_server_host_get.json.result | length > 0
    - zbx_server_host_get.json.result[0].status != "0"

- name: Add agent interface to Zabbix server host if missing
  ansible.builtin.uri:
    url: "{{ zabbix_url }}/api_jsonrpc.php"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "hostinterface.create"
      params:
        hostid: "{{ zbx_server_host_get.json.result[0].hostid }}"
        type: 1
        main: 1
        useip: 1
        ip: "127.0.0.1"
        dns: ""
        port: "10050"
      auth: "{{ zbx_token }}"
      id: 1
  when:
    - zbx_server_host_get.json.result | length > 0
    - zbx_server_host_get.json.result[0].interfaces | selectattr('type', 'equalto', '1') | list | length == 0
