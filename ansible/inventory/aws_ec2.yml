---
plugin: amazon.aws.aws_ec2
# Pinned region: the Controller inventory sync runs in the EE where the AWS
# credential injects keys but no region. Keep in step with AWS_REGION in .env.
regions:
  - us-east-2
filters:
  "tag:Project":
    - aap-jira-demo
  instance-state-name:
    - running
keyed_groups:
  - key: ec2_tags.Role
    prefix: tag_Role
    separator: "_"
compose:
  ansible_host: public_ip_address
hostnames:
  - tag:Name
